name: sync_ui
description: Shared Flutter UI for the desktop and mobile apps — the device list and the pairing flow, so both platforms behave identically.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.12.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  file_selector: ^1.0.3
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.0
  sync_net:
    path: ../sync_net

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
